# release-plz configuration.
#
# release-plz watches Conventional Commits on main, opens a rolling
# release PR that bumps the Cargo.toml version and updates CHANGELOG.md,
# and (after that PR merges) creates a git tag + GitHub Release.
#
# Publishing to crates.io is deliberately off during the v0.1.0-preview
# window — flip `publish = true` once the API is stable enough to
# guarantee semver compatibility for external consumers.

[workspace]
# Never `cargo publish` — v0.1.0-preview is not on crates.io yet.
publish = false

# Skip API-diff checks against crates.io. Without this, release-plz
# emits `WARN Package plug-audit@*.*.* not found` because plug-audit
# is not published to crates.io during the v0.1.x preview.
semver_check = false

# Force release-plz to open a release PR whenever ANY commit lands on
# main since the last tag, regardless of whether the packaged-file
# diff considers the change "significant." Without this, release-plz's
# default heuristic (comparing the current tree against the last tag's
# packaged files) can conclude "no change" even when a genuine
# `fix:` commit has landed — observed after PR #31 merged, where
# release-plz said "next version is 0.1.0" despite a real fix commit.
release_always = true

# Create a git tag on release so cargo-dist (added separately) can pick
# it up and attach cross-platform binaries.
git_tag_enable = true

# Create a GitHub Release from the tag with the changelog body.
git_release_enable = true

# Newest-first changelog reads more naturally in the release body.
[changelog]
sort_commits = "newest"
