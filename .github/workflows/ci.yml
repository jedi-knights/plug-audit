name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger — recovers from occasional GitHub-side registration
  # lag where a post-merge push does not spin up a run automatically.
  workflow_dispatch:

# Cancel in-progress runs when a new commit is pushed to the same ref —
# keeps queue depth low on rapid iteration.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal privileges — the workflow only reads code and reports checks.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # `rust-toolchain.toml` in the repo pins the exact channel;
      # `rustup show` reads the file and installs the pinned toolchain.
      # `rustfmt` and `clippy` are declared as required components in
      # that same file, so they land alongside the compiler.
      - name: install toolchain
        run: rustup show

      - name: cache
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    # Job-level permissions replace (not merge with) the workflow-level
    # set, so `contents: read` is re-declared alongside the writes that
    # `jedi-knights/publish-test-results` needs to post a check and
    # annotate the PR.
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: install toolchain
        run: rustup show

      - name: cache
        uses: Swatinem/rust-cache@v2

      # `cargo-nextest` is a parallel replacement for `cargo test` that
      # writes JUnit XML natively (see .config/nextest.toml). Doctests
      # are not covered by nextest and are handled by a follow-up step.
      - name: install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: cargo nextest run
        run: cargo nextest run --all-features --workspace --profile ci

      - name: cargo test --doc
        run: cargo test --doc --all-features --workspace

      # Always run so a failing test still gets a published report with
      # per-case annotations in the Checks tab.
      - name: publish test results
        if: always()
        uses: jedi-knights/publish-test-results@v0
        with:
          files: target/nextest/ci/junit.xml
          check-name: cargo tests

  coverage:
    name: line coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: install toolchain
        run: rustup show

      - name: install llvm-tools-preview
        run: rustup component add llvm-tools-preview

      - name: cache
        uses: Swatinem/rust-cache@v2

      - name: install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      # Coverage report is emitted for visibility; the 90% target from
      # the portfolio TODO becomes a hard gate once we have a
      # baseline. For now: measure, print, do not fail.
      - name: cargo llvm-cov
        run: cargo llvm-cov --all-features --workspace --summary-only

  # Regenerates lcov coverage and updates the README badge, committing
  # back to main. Deliberately isolated to `push` on `main` — PRs from
  # feature branches must not race to modify README, and unauthenticated
  # forks cannot receive the `contents: write` permission this needs.
  badge:
    name: coverage badge
    # Runs on merges to main AND on manual re-runs (workflow_dispatch)
    # against the main ref. Feature-branch PRs never enter this gate,
    # so they cannot race to rewrite README.
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: [lint, test, coverage]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # `token:` is required so the subsequent `git push` uses a token
      # tied to the workflow's write permission, not the default
      # read-only checkout token.
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: install toolchain
        run: rustup show

      - name: install llvm-tools-preview
        run: rustup component add llvm-tools-preview

      - name: cache
        uses: Swatinem/rust-cache@v2

      - name: install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: generate lcov coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      # coverage-badge auto-detects lcov.info at repo root. It rewrites
      # the shields.io badge inline; the following step commits and pushes
      # if the file actually changed.
      - name: update coverage badge
        uses: jedi-knights/coverage-badge@v0

      # `[skip ci]` in the commit message is load-bearing — without it,
      # the badge commit would trigger another CI run, which would
      # trigger another badge commit, ad infinitum.
      - name: commit badge if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet README.md; then
            git add README.md
            git commit -m "chore: update coverage badge [skip ci]"
            git push
          fi
