name: Release

# Phase 1 of the two-phase release pipeline (migrated from release-plz to
# go-semantic-release for a consistent release flow across the org's repos —
# this file mirrors nasm-lint/vcl-toolkit release.yml).
# After CI passes on main, go-semantic-release analyzes the conventional commits
# since the last tag, computes the next semantic version, writes CHANGELOG.md and
# VERSION, bumps the crate version in Cargo.toml + Cargo.lock, commits them back
# to main with [skip ci], and pushes a `v*` tag.
#
# No Rust toolchain is required here — go-semantic-release updates Cargo.toml and
# Cargo.lock natively (that is why the old rustup/rust-cache steps are gone).
#
# Phase 2 (cross-platform binary builds + GitHub Release) is handled by cargo-dist
# (dist.yml), triggered automatically by the `v*` tag pushed here.
#
# The push is authenticated with the GH_TOKEN PAT (not the default GITHUB_TOKEN)
# so the resulting tag actually triggers dist.yml — tags pushed by GITHUB_TOKEN do
# not trigger further workflow runs.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.name "semantic-release-bot"
          git config --global user.email "semantic-release-bot@users.noreply.github.com"

      - uses: jedi-knights/go-semantic-release@v0
        with:
          github_token: ${{ secrets.GH_TOKEN }}
